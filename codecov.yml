# Codecov configuration for the PostHog wizard.
# Schema reference: https://docs.codecov.com/docs/codecovyml-reference

codecov:
  require_ci_to_pass: true
  notify:
    # Hold the Codecov status until every other check has reported; this
    # keeps the PR ladder coherent when a slow job is still running.
    wait_for_ci: true

coverage:
  # Visual range for the coverage badge. The lower bound is intentionally
  # generous while the wizard's test suite is still growing; bump it as
  # coverage improves so the colour scale stays meaningful.
  range: "40...100"
